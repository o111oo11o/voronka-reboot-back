services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voronka
      POSTGRES_USER: voronka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voronka}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voronka -d voronka"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${BACK_IMAGE:-ghcr.io/o111oo11o/voronka-back:latest}
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://voronka:${POSTGRES_PASSWORD:-voronka}@db:5432/voronka?sslmode=disable
      GOOSE_MIGRATION_DIR: /app/db/migrations
    entrypoint: ["/app/goose"]
    command: ["up"]
    restart: "no"

  back:
    image: ${BACK_IMAGE:-ghcr.io/o111oo11o/voronka-back:latest}
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: postgres://voronka:${POSTGRES_PASSWORD:-voronka}@db:5432/voronka?sslmode=disable
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      HTTP_PORT: 8080
    volumes:
      - uploads:/app/uploads
    ports:
      - "9080:8080"

  front:
    image: ghcr.io/o111oo11o/voronka-front:latest
    restart: unless-stopped
    depends_on:
      - back
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  uploads:
